<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Hill</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div class="container">
        <div class="card" id="surpriseCard">
            <div class="card-inner" id="cardInner">
                <div class="card-front">
                    <h1>Ready for a surprise?</h1>
                    <p>Tap the card to reveal.</p>
                    <div class="pulse-ring"></div>
                </div>
                <div class="card-back">
                    <h2>Surprise! 🎉</h2>
                    <p class="roast" id="roastText">Loading...</p>
                    <button id="nextBtn" class="glow-on-hover">Burn me again 🔥</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
